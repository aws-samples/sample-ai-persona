{# 記憶削除エラー表示パーシャル（htmx swap用） #}
{# 個別記憶削除失敗時に、元の記憶アイテムの代わりに表示される #}
{% from "components/icons.html" import icon_x_circle %}

<div id="memory-item-{{ memory_id }}" class="bg-red-50 rounded-lg p-4 border border-red-200">
    <div class="flex items-start gap-3">
        {{ icon_x_circle("w-5 h-5 text-red-500 flex-shrink-0 mt-0.5") }}
        <div class="flex-1">
            <p class="text-red-700 text-sm font-medium">削除エラー</p>
            <p class="text-red-600 text-sm mt-1">{{ error }}</p>
        </div>
        <button 
            onclick="this.closest('[id^=memory-item-]').remove()"
            class="text-red-400 hover:text-red-600 p-1 rounded transition-colors"
            title="閉じる"
        >
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
            </svg>
        </button>
    </div>
</div>
