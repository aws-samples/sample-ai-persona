{# 知識ファイルプレビューパーシャル（htmx swap用） #}
<div class="bg-blue-50 rounded-lg p-4 border border-blue-200">
    <div class="flex items-center gap-2 mb-3">
        <svg class="w-5 h-5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
        </svg>
        <h4 class="font-medium text-blue-900">ファイルプレビュー: {{ file_name }}</h4>
    </div>
    
    <form 
        hx-post="/persona/{{ persona_id }}/memories"
        hx-target="#memory-list-container"
        hx-swap="innerHTML"
        hx-indicator="#preview-add-indicator"
        class="space-y-3"
    >
        <input type="hidden" name="strategy_type" value="semantic">
        
        <div>
            <label for="preview_topic_name" class="block text-sm font-medium text-gray-700 mb-1">
                トピック名 <span class="text-red-500">*</span>
            </label>
            <input 
                type="text" 
                id="preview_topic_name" 
                name="topic_name" 
                value="{{ topic_name }}"
                class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm"
                required
            >
        </div>
        
        <div>
            <label for="preview_topic_content" class="block text-sm font-medium text-gray-700 mb-1">
                内容 <span class="text-red-500">*</span>
                <span class="text-xs text-gray-500 font-normal ml-2">({{ content_length }}/10000文字)</span>
            </label>
            <textarea 
                id="preview_topic_content" 
                name="topic_content" 
                rows="10"
                class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm font-mono"
                required
            >{{ markdown_content }}</textarea>
            <p class="mt-1 text-xs text-gray-500">マークダウン形式に変換されました。必要に応じて編集してください。</p>
        </div>
        
        <div class="flex items-center justify-end gap-2 pt-2">
            <button 
                type="button"
                onclick="this.closest('#file-upload-preview-area').innerHTML = ''"
                class="px-3 py-1.5 text-sm text-gray-600 hover:text-gray-800 hover:bg-gray-100 rounded-md transition-colors"
            >
                キャンセル
            </button>
            <button 
                type="submit"
                class="px-4 py-1.5 text-sm bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition-colors flex items-center gap-2"
            >
                <span id="preview-add-indicator" class="htmx-indicator">
                    <svg class="animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </span>
                <span class="htmx-indicator-hide">事実・知識として追加</span>
            </button>
        </div>
    </form>
</div>
