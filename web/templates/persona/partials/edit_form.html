{% from "components/icons.html" import icon_pencil, icon_arrow_left, icon_check %}
<!-- ペルソナ編集フォーム（詳細画面用） -->
<div>
    <!-- ヘッダー -->
    <div class="flex items-center justify-between mb-8">
        <div>
            <a href="/persona/{{ persona.id }}" class="text-blue-600 hover:text-blue-800 text-sm mb-2 inline-flex items-center gap-1">
                {{ icon_arrow_left("w-4 h-4") }} 詳細に戻る
            </a>
            <h1 class="text-3xl font-bold text-gray-900 flex items-center gap-2">
                {{ icon_pencil("w-8 h-8 text-blue-600") }} ペルソナ編集
            </h1>
            <p class="text-gray-600">{{ persona.name }} の属性を編集</p>
        </div>
    </div>
    
    <form hx-put="/persona/{{ persona.id }}"
          hx-target="#persona-detail-container"
          hx-swap="innerHTML"
          class="space-y-6">
        
        <!-- 基本情報 -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold text-gray-900 mb-4">基本情報</h2>
            <div class="grid md:grid-cols-3 gap-4">
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-1">名前</label>
                    <input type="text" id="name" name="name" value="{{ persona.name }}" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label for="age" class="block text-sm font-medium text-gray-700 mb-1">年齢</label>
                    <input type="number" id="age" name="age" value="{{ persona.age }}" min="0" max="150" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label for="occupation" class="block text-sm font-medium text-gray-700 mb-1">職業</label>
                    <input type="text" id="occupation" name="occupation" value="{{ persona.occupation }}" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
            </div>
        </div>
        
        <!-- 背景 -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <label for="background" class="block text-xl font-semibold text-gray-900 mb-4">背景・プロフィール</label>
            <textarea id="background" name="background" rows="4" required
                      class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500">{{ persona.background }}</textarea>
        </div>
        
        <!-- 価値観 -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <label for="values" class="block text-xl font-semibold text-gray-900 mb-2">価値観・信念</label>
            <p class="text-sm text-gray-500 mb-4">1行に1項目を入力してください</p>
            <textarea id="values" name="values" rows="4" required
                      class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500">{% for value in persona.values %}{{ value }}{% if not loop.last %}
{% endif %}{% endfor %}</textarea>
        </div>
        
        <!-- 課題・悩み -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <label for="pain_points" class="block text-xl font-semibold text-gray-900 mb-2">課題・悩み</label>
            <p class="text-sm text-gray-500 mb-4">1行に1項目を入力してください</p>
            <textarea id="pain_points" name="pain_points" rows="4" required
                      class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500">{% for pain_point in persona.pain_points %}{{ pain_point }}{% if not loop.last %}
{% endif %}{% endfor %}</textarea>
        </div>
        
        <!-- 目標・願望 -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <label for="goals" class="block text-xl font-semibold text-gray-900 mb-2">目標・願望</label>
            <p class="text-sm text-gray-500 mb-4">1行に1項目を入力してください</p>
            <textarea id="goals" name="goals" rows="4" required
                      class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500">{% for goal in persona.goals %}{{ goal }}{% if not loop.last %}
{% endif %}{% endfor %}</textarea>
        </div>
        
        <!-- ボタン -->
        <div class="flex justify-end gap-3">
            <a href="/persona/{{ persona.id }}"
               class="px-4 py-2 text-gray-700 bg-gray-100 rounded-md hover:bg-gray-200 transition-colors">
                キャンセル
            </a>
            <button type="submit"
                    class="px-4 py-2 text-white bg-blue-600 rounded-md hover:bg-blue-700 transition-colors flex items-center gap-1.5">
                {{ icon_check("w-4 h-4") }} 保存
            </button>
        </div>
    </form>
</div>
