{# 知識ファイルアップロードエラーパーシャル #}
<div class="bg-red-100 border-2 border-red-400 text-red-700 px-4 py-3 rounded-md flex items-start gap-3 shadow-md">
    <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
    </svg>
    <div class="flex-1">
        <p class="font-semibold text-base">ファイルアップロードエラー</p>
        <p class="text-sm mt-1">{{ error }}</p>
    </div>
    <button 
        onclick="this.closest('#file-upload-preview-area').innerHTML = ''"
        class="text-red-700 hover:text-red-900 flex-shrink-0"
        title="閉じる"
    >
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
        </svg>
    </button>
</div>
