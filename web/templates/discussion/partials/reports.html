<!-- レポート生成・一覧パーシャル -->
<div x-data="{
    selectedTemplate: 'summary',
    showCustomPrompt: false,
    generating: false,
    activeReportId: null,
    selectTemplate(type) {
        this.selectedTemplate = type;
        this.showCustomPrompt = type === 'custom';
    }
}">
    <!-- レポート生成フォーム -->
    <div class="mb-6">
        <h3 class="text-sm font-semibold text-gray-700 mb-3">テンプレートを選択</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
            <button type="button" @click="selectTemplate('summary')"
                    :class="selectedTemplate === 'summary' ? 'border-emerald-500 bg-emerald-50 ring-1 ring-emerald-500' : 'border-gray-200 hover:border-gray-300'"
                    class="border rounded-lg p-3 text-left transition-all">
                <div class="flex items-center gap-2 mb-1">
                    <svg class="w-4 h-4 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
                    </svg>
                    <span class="text-sm font-semibold text-gray-900">サマリレポート</span>
                </div>
                <p class="text-xs text-gray-500">ペルソナ概要、意見まとめ、インサイト、Next Action</p>
            </button>
            <button type="button" @click="selectTemplate('review')"
                    :class="selectedTemplate === 'review' ? 'border-blue-500 bg-blue-50 ring-1 ring-blue-500' : 'border-gray-200 hover:border-gray-300'"
                    class="border rounded-lg p-3 text-left transition-all">
                <div class="flex items-center gap-2 mb-1">
                    <svg class="w-4 h-4 text-blue-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 9.75a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0h-.375m-13.5 3.01c0 1.6 1.123 2.994 2.707 3.227 1.087.16 2.185.283 3.293.369V21l4.184-4.183a1.14 1.14 0 0 1 .778-.332 48.294 48.294 0 0 0 5.83-.498c1.585-.233 2.708-1.626 2.708-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0 0 12 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018Z" />
                    </svg>
                    <span class="text-sm font-semibold text-gray-900">レビューコメント</span>
                </div>
                <p class="text-xs text-gray-500">該当箇所、指摘内容、重要度</p>
            </button>
            <button type="button" @click="selectTemplate('custom')"
                    :class="selectedTemplate === 'custom' ? 'border-purple-500 bg-purple-50 ring-1 ring-purple-500' : 'border-gray-200 hover:border-gray-300'"
                    class="border rounded-lg p-3 text-left transition-all">
                <div class="flex items-center gap-2 mb-1">
                    <svg class="w-4 h-4 text-purple-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125" />
                    </svg>
                    <span class="text-sm font-semibold text-gray-900">カスタム</span>
                </div>
                <p class="text-xs text-gray-500">自由にプロンプトを入力して出力形式を指定</p>
            </button>
        </div>

        <!-- カスタムプロンプト入力 -->
        <div x-show="showCustomPrompt" x-transition class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">カスタムプロンプト</label>
            <textarea id="custom-prompt-input"
                      rows="3"
                      class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
                      placeholder="例: 箇条書きで主要な発見を5つにまとめてください"></textarea>
        </div>

        <!-- 生成ボタン -->
        <form hx-post="/discussion/{{ discussion.id }}/report/generate"
              hx-target="#report-display"
              hx-swap="innerHTML"
              hx-indicator="#report-loading"
              @htmx:before-request="generating = true"
              @htmx:after-request="generating = false">
            <input type="hidden" name="template_type" :value="selectedTemplate">
            <input type="hidden" name="custom_prompt" :value="showCustomPrompt ? document.getElementById('custom-prompt-input')?.value : ''">
            <button type="submit"
                    :disabled="generating"
                    class="bg-emerald-600 text-white px-4 py-2 rounded-lg hover:bg-emerald-700 transition-colors text-sm font-medium flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                <svg x-show="!generating" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 0 0-2.455 2.456ZM16.894 20.567 16.5 21.75l-.394-1.183a2.25 2.25 0 0 0-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 0 0 1.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 0 0 1.423 1.423l1.183.394-1.183.394a2.25 2.25 0 0 0-1.423 1.423Z" />
                </svg>
                <svg x-show="generating" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
                <span x-text="generating ? 'レポート生成中...' : 'レポートを生成'"></span>
            </button>
        </form>
    </div>

    <!-- 生成済みレポート一覧 -->
    {% if discussion.reports %}
    <div class="mb-4">
        <h3 class="text-sm font-semibold text-gray-700 mb-3">生成済みレポート ({{ discussion.reports|length }}件)</h3>
        <div class="space-y-2">
            {% for report in discussion.reports|reverse %}
            <div class="flex items-center justify-between bg-gray-50 rounded-lg px-4 py-3 border border-gray-200 hover:border-gray-300 transition-colors">
                <button hx-get="/discussion/{{ discussion.id }}/report/{{ report.id }}"
                        hx-target="#report-display"
                        hx-swap="innerHTML"
                        class="flex items-center gap-3 text-left flex-1"
                        @click="activeReportId = '{{ report.id }}'">
                    {% if report.template_type == 'summary' %}
                    <span class="px-2 py-0.5 text-xs rounded-full bg-emerald-100 text-emerald-800">サマリ</span>
                    {% elif report.template_type == 'review' %}
                    <span class="px-2 py-0.5 text-xs rounded-full bg-blue-100 text-blue-800">レビュー</span>
                    {% else %}
                    <span class="px-2 py-0.5 text-xs rounded-full bg-purple-100 text-purple-800">カスタム</span>
                    {% endif %}
                    <span class="text-sm text-gray-600">{{ report.created_at.strftime('%Y/%m/%d %H:%M') }}</span>
                    {% if report.custom_prompt %}
                    <span class="text-xs text-gray-400 truncate max-w-xs">{{ report.custom_prompt[:50] }}{% if report.custom_prompt|length > 50 %}...{% endif %}</span>
                    {% endif %}
                </button>
                <div class="flex items-center gap-1 ml-2">
                    <a href="/discussion/{{ discussion.id }}/report/{{ report.id }}/export?format=md"
                       class="text-xs text-gray-500 hover:text-gray-700 px-2 py-1 rounded hover:bg-gray-200 transition-colors"
                       title="Markdownでエクスポート">MD</a>
                    <a href="/discussion/{{ discussion.id }}/report/{{ report.id }}/export?format=txt"
                       class="text-xs text-gray-500 hover:text-gray-700 px-2 py-1 rounded hover:bg-gray-200 transition-colors"
                       title="テキストでエクスポート">TXT</a>
                    <button hx-delete="/discussion/{{ discussion.id }}/report/{{ report.id }}"
                            hx-confirm="このレポートを削除しますか？"
                            hx-target="closest div.flex"
                            hx-swap="outerHTML"
                            class="text-red-400 hover:text-red-600 p-1 rounded hover:bg-red-50 transition-colors">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                        </svg>
                    </button>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
    {% endif %}

    <!-- レポート表示エリア -->
    <div id="report-display">
        <div id="report-loading" class="htmx-indicator flex items-center justify-center py-8">
            <svg class="animate-spin h-6 w-6 text-emerald-600 mr-2" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            <span class="text-sm text-gray-500">レポートを生成しています...</span>
        </div>
    </div>
</div>
