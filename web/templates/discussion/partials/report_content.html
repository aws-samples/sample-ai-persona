<!-- レポート内容表示パーシャル -->
<div class="bg-gray-50 rounded-lg border border-gray-200 p-6">
    <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2">
            {% if report.template_type == 'summary' %}
            <span class="px-2 py-0.5 text-xs rounded-full bg-emerald-100 text-emerald-800">サマリレポート</span>
            {% elif report.template_type == 'review' %}
            <span class="px-2 py-0.5 text-xs rounded-full bg-blue-100 text-blue-800">レビューコメント</span>
            {% else %}
            <span class="px-2 py-0.5 text-xs rounded-full bg-purple-100 text-purple-800">カスタム</span>
            {% endif %}
            <span class="text-xs text-gray-500">{{ report.created_at.strftime('%Y/%m/%d %H:%M') }}</span>
        </div>
    </div>
    <div class="prose prose-slate max-w-none
                prose-headings:font-bold prose-headings:text-gray-900
                prose-h1:text-2xl prose-h1:mb-4 prose-h1:mt-6
                prose-h2:text-xl prose-h2:mb-3 prose-h2:mt-5
                prose-h3:text-lg prose-h3:mb-2 prose-h3:mt-4
                prose-p:text-gray-700 prose-p:mb-3 prose-p:leading-relaxed
                prose-ul:my-3 prose-ul:list-disc prose-ul:pl-6
                prose-ol:my-3 prose-ol:list-decimal prose-ol:pl-6
                prose-li:mb-1
                prose-strong:text-gray-900 prose-strong:font-semibold
                prose-table:my-4 prose-table:border-collapse
                prose-th:border prose-th:border-gray-300 prose-th:bg-gray-100 prose-th:px-4 prose-th:py-2 prose-th:font-semibold
                prose-td:border prose-td:border-gray-300 prose-td:px-4 prose-td:py-2
                prose-hr:my-6 prose-hr:border-gray-300">
        {{ report.content | markdown | safe }}
    </div>
</div>
