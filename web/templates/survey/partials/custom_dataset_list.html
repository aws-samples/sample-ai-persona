{% if custom_datasets %}
<h3 class="text-sm font-semibold text-gray-700 mb-3">アップロード済みデータセット</h3>
<div class="space-y-2">
    {% for ds in custom_datasets %}
    <div>
        <div class="flex items-center justify-between bg-gray-50 rounded-lg px-4 py-3">
            <div class="flex items-center gap-3">
                <svg class="w-5 h-5 text-teal-600 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 6.375c0 2.278-3.694 4.125-8.25 4.125S3.75 8.653 3.75 6.375m16.5 0c0-2.278-3.694-4.125-8.25-4.125S3.75 4.097 3.75 6.375m16.5 0v11.25c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125V6.375m16.5 0v3.75m-16.5-3.75v3.75m16.5 0v3.75C20.25 16.153 16.556 18 12 18s-8.25-1.847-8.25-4.125v-3.75m16.5 0c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125" />
                </svg>
                <div>
                    <p class="text-sm font-medium text-gray-900">{{ ds.name }}</p>
                    <p class="text-xs text-gray-500">{{ ds.size_mb }} MB</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button hx-get="/survey/persona-data/custom/{{ ds.name }}/detail"
                        hx-target="#detail-{{ ds.name | replace(' ', '-') }}"
                        hx-swap="innerHTML"
                        class="text-blue-500 hover:text-blue-700 text-sm">
                    詳細
                </button>
                <button hx-delete="/survey/persona-data/custom/{{ ds.name }}"
                        hx-target="#custom-dataset-list"
                        hx-swap="innerHTML"
                        hx-confirm="「{{ ds.name }}」を削除しますか？"
                        class="text-red-500 hover:text-red-700 text-sm">
                    削除
                </button>
            </div>
        </div>
        <div id="detail-{{ ds.name | replace(' ', '-') }}"></div>
    </div>
    {% endfor %}
</div>
{% endif %}
