{% if nemotron_status.exists %}
<div class="flex items-center gap-3 bg-green-50 border border-green-200 rounded-lg p-4">
    <svg class="w-5 h-5 text-green-600 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
    </svg>
    <div>
        <p class="text-green-800 font-medium text-sm">ダウンロード済み</p>
        <p class="text-green-600 text-xs">データサイズ: {{ nemotron_status.size_mb }} MB</p>
    </div>
</div>
{% if success is defined and success %}
<div class="mt-2 text-sm text-green-600">✓ ダウンロードが完了しました。</div>
{% endif %}
{% else %}
<div class="flex items-center justify-between bg-yellow-50 border border-yellow-200 rounded-lg p-4">
    <div class="flex items-center gap-3">
        <svg class="w-5 h-5 text-yellow-600 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
        </svg>
        <p class="text-yellow-800 text-sm">データセットがまだダウンロードされていません。</p>
    </div>
    <button hx-post="/survey/persona-data/download-nemotron"
            hx-target="#nemotron-status"
            hx-swap="innerHTML"
            hx-indicator="#dl-spinner"
            class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition-colors flex items-center gap-2 text-sm flex-shrink-0">
        <span id="dl-spinner" class="htmx-indicator">
            <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
        </span>
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
        </svg>
        ダウンロード
    </button>
</div>
{% if error is defined and error %}
<div class="mt-2 text-sm text-red-600">エラー: {{ error }}</div>
{% endif %}
{% endif %}
