<form hx-post="/settings/d360" hx-target="#d360-settings" hx-swap="innerHTML" class="space-y-4">
    <div>
        <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" name="enabled" value="true"
                   {% if d360_enabled %}checked{% endif %}
                   class="rounded border-gray-300 text-purple-600 focus:ring-purple-500">
            <span class="text-sm font-medium text-gray-700">D360 連携を有効にする</span>
        </label>
    </div>

    <div>
        <label for="d360_runtime_arn" class="block text-sm font-medium text-gray-700 mb-1">AgentCore Runtime ARN</label>
        <input type="text"
               name="runtime_arn"
               id="d360_runtime_arn"
               value="{{ d360_runtime_arn or '' }}"
               placeholder="arn:aws:bedrock:ap-northeast-1:123456789012:agent-runtime/dwh_agent"
               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm font-mono">
    </div>

    <div>
        <label for="d360_region" class="block text-sm font-medium text-gray-700 mb-1">リージョン</label>
        <input type="text"
               name="region"
               id="d360_region"
               value="{{ d360_region or 'ap-northeast-1' }}"
               placeholder="ap-northeast-1"
               class="w-48 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm">
    </div>

    <div class="flex items-center gap-3">
        <button type="submit"
                class="bg-purple-600 text-white px-4 py-2 rounded-md hover:bg-purple-700 transition-colors text-sm">
            保存
        </button>
        {% if d360_enabled and d360_runtime_arn %}
        <button type="button"
                hx-post="/settings/d360/test"
                hx-target="#d360-test-result"
                hx-swap="innerHTML"
                class="border border-purple-300 text-purple-700 px-4 py-2 rounded-md hover:bg-purple-50 transition-colors text-sm">
            接続テスト
        </button>
        {% endif %}
    </div>

    <div id="d360-test-result"></div>

    {% if save_message %}
    <div class="text-sm text-green-600 bg-green-50 rounded p-2">{{ save_message }}</div>
    {% endif %}
</form>
