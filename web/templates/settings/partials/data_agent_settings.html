<form hx-post="/settings/data-agent" hx-target="#data-agent-settings" hx-swap="innerHTML" class="space-y-4">
    <div>
        <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" name="enabled" value="true"
                   {% if data_agent_enabled %}checked{% endif %}
                   class="rounded border-gray-300 text-purple-600 focus:ring-purple-500">
            <span class="text-sm font-medium text-gray-700">データ分析エージェント 連携を有効にする</span>
        </label>
    </div>

    <div>
        <label for="data_agent_runtime_arn" class="block text-sm font-medium text-gray-700 mb-1">AgentCore Runtime ARN</label>
        <input type="text"
               name="runtime_arn"
               id="data_agent_runtime_arn"
               value="{{ data_agent_runtime_arn or '' }}"
               placeholder="arn:aws:bedrock:ap-northeast-1:123456789012:agent-runtime/dwh_agent"
               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm font-mono">
    </div>

    <div>
        <label for="data_agent_region" class="block text-sm font-medium text-gray-700 mb-1">リージョン</label>
        <input type="text"
               name="region"
               id="data_agent_region"
               value="{{ data_agent_region or 'ap-northeast-1' }}"
               placeholder="ap-northeast-1"
               class="w-48 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm">
    </div>

    <div class="flex items-center gap-3">
        <button type="submit"
                class="bg-purple-600 text-white px-4 py-2 rounded-md hover:bg-purple-700 transition-colors text-sm">
            保存
        </button>
        {% if data_agent_enabled and data_agent_runtime_arn %}
        <button type="button"
                hx-post="/settings/data-agent/test"
                hx-target="#data-agent-test-result"
                hx-swap="innerHTML"
                hx-disabled-elt="this"
                hx-indicator="#data-agent-test-spinner"
                class="border border-purple-300 text-purple-700 px-4 py-2 rounded-md hover:bg-purple-50 transition-colors text-sm inline-flex items-center gap-2">
            <span id="data-agent-test-spinner" class="htmx-indicator">
                <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
            </span>
            接続テスト
        </button>
        {% endif %}
    </div>

    <div id="data-agent-test-result"></div>

    {% if save_message %}
    <div class="text-sm text-green-600 bg-green-50 rounded p-2">{{ save_message }}</div>
    {% endif %}
</form>
